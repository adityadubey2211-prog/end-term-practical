<!DOCTYPE html>
<html>
<head>
    <title>Student Marks Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }

        .container {
            width: 300px;
            margin: auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 5px 0;
        }      

        button {
            padding: 10px 20px;
            margin-top: 10px;
            cursor: pointer;
        }

        #result {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Student Marks Calculator</h2>

    <input type="number" id="m1" placeholder="Subject 1 Marks"><br>
    <input type="number" id="m2" placeholder="Subject 2 Marks"><br>
    <input type="number" id="m3" placeholder="Subject 3 Marks"><br>
    <input type="number" id="m4" placeholder="Subject 4 Marks"><br>
    <input type="number" id="m5" placeholder="Subject 5 Marks"><br>

    <button onclick="calculate()">Calculate</button>

    <div id="result"></div>
</div>

<script>
function calculate() {
    let m1 = Number(document.getElementById("m1").value);
    let m2 = Number(document.getElementById("m2").value);
    let m3 = Number(document.getElementById("m3").value);
    let m4 = Number(document.getElementById("m4").value);
    let m5 = Number(document.getElementById("m5").value);

    let total = m1 + m2 + m3 + m4 + m5;
    let average = total / 5;
    let percentage = (total / 500) * 100;

    document.getElementById("result").innerHTML =
        "Total Marks: " + total + "<br>" +
        "Average Marks: " + average.toFixed(2) + "<br>" +
        "Percentage: " + percentage.toFixed(2) + "%";
}
</script>

</body>
</html>
